<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Lumi AI Editor</title>
    <script>
      // Redirect SPA routes to index.html via query param encoding.
      // pathSegmentsToKeep=1 preserves the /Lumi-AI-Editor/ repo prefix.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
